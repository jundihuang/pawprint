name: Sync to Public Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean private content
        run: |
          rm -rf docs/projects/* docs/areas/* docs/resources/* docs/archives/*
          rm -f docs.config.json
          rm -rf .vercel

          cp .github/public-template/docs.config.json docs.config.json
          cp -r .github/public-template/docs/* docs/

          rm -rf .github

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to public repo
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
        run: |
          git config user.email "jayce9210@gmail.com"
          git config user.name "Jayce"
          git add -A
          git commit -m "sync: ${{ github.event.head_commit.message }}" --allow-empty
          git remote add public git@github.com:jundihuang/pawprint.git
          git push public main --force
