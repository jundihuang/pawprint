<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPrint — Docs</title>
<style>
  :root {
    --bg: #fafafa; --card: #fff; --text: #1a1a1a; --muted: #666;
    --border: #e5e5e5; --accent: #2563eb; --accent-light: #eff6ff;
    --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
    --code-bg: #f5f5f5; --hover: #f8f8f8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ===== List View ===== */
  #list-view .site-header {
    margin-bottom: 40px;
    text-align: center;
  }
  #list-view .site-header h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
  }
  #list-view .site-header p {
    font-size: 14px; color: var(--muted); margin-top: 6px;
  }
  .doc-grid { display: flex; flex-direction: column; gap: 12px; }
  .doc-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    cursor: pointer;
    transition: all .15s ease;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .doc-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(37,99,235,0.06);
    transform: translateY(-1px);
  }
  .doc-icon {
    font-size: 28px; flex-shrink: 0;
    width: 48px; height: 48px;
    background: var(--accent-light);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .doc-info { flex: 1; min-width: 0; }
  .doc-info h3 {
    font-size: 16px; font-weight: 600; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .doc-info p { font-size: 13px; color: var(--muted); }
  .doc-meta-row {
    display: flex; gap: 12px; margin-top: 8px;
    font-size: 12px; color: var(--muted);
  }
  .lock-icon { font-size: 14px; color: var(--yellow); }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .badge-lock { background: #fefce8; color: var(--yellow); }

  /* ===== Auth Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--card); border-radius: 14px;
    padding: 32px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    transform: scale(0.95); transition: transform .2s;
  }
  .modal-overlay.active .modal { transform: scale(1); }
  .modal h2 { font-size: 17px; margin-bottom: 4px; }
  .modal .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal button {
    width: 100%; padding: 10px; margin-top: 10px;
    background: var(--text); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; cursor: pointer;
    transition: opacity .2s;
  }
  .modal button:hover { opacity: .85; }
  .modal button:disabled { opacity: .5; cursor: not-allowed; }
  .modal .error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
  .modal .cancel {
    background: none; color: var(--muted);
    border: 1px solid var(--border); margin-top: 8px;
  }
  .modal .cancel:hover { background: var(--hover); }

  /* ===== Doc View ===== */
  #doc-view { display: none; }
  .doc-header {
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .doc-header .back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted); text-decoration: none;
    margin-bottom: 16px; cursor: pointer;
    transition: color .15s;
  }
  .doc-header .back:hover { color: var(--accent); }
  .doc-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .doc-header .meta {
    display: flex; gap: 16px; margin-top: 8px;
    font-size: 13px; color: var(--muted);
  }

  /* Markdown render */
  .md-body h1 { font-size: 24px; font-weight: 700; margin: 36px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .md-body h2 { font-size: 20px; font-weight: 700; margin: 36px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .md-body h3 { font-size: 16px; font-weight: 600; margin: 24px 0 10px; }
  .md-body p { margin-bottom: 12px; font-size: 15px; }
  .md-body ul, .md-body ol { padding-left: 24px; margin-bottom: 12px; }
  .md-body li { margin-bottom: 4px; font-size: 14px; }
  .md-body blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    padding: 12px 16px; margin: 16px 0;
    border-radius: 0 8px 8px 0; font-size: 14px;
  }
  .md-body pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; overflow-x: auto;
    font-size: 13px; line-height: 1.5; margin: 16px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .md-body code {
    background: var(--code-bg); padding: 2px 5px;
    border-radius: 4px; font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .md-body pre code { background: none; padding: 0; }
  .md-body table {
    width: 100%; border-collapse: collapse;
    font-size: 14px; margin: 16px 0;
  }
  .md-body th {
    background: var(--code-bg); font-weight: 600;
    text-align: left; padding: 10px 14px;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  .md-body td {
    padding: 9px 14px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .md-body tr:last-child td { border-bottom: none; }
  .md-body strong { font-weight: 600; }
  .md-body a { color: var(--accent); text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .md-body img { max-width: 100%; border-radius: 8px; }

  .doc-footer {
    margin-top: 48px; padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); text-align: center;
  }

  .loading {
    text-align: center; padding: 60px 0;
    color: var(--muted); font-size: 14px;
  }

  /* ===== Search ===== */
  .search-bar { margin-bottom: 16px; }
  .search-bar input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; outline: none;
    background: var(--card); color: var(--text);
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* ===== Category Tabs ===== */
  .category-tabs {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    color: var(--muted); text-decoration: none;
    border: 1px solid transparent;
    transition: all .15s ease;
    cursor: pointer;
  }
  .cat-tab:hover { color: var(--text); background: var(--hover); }
  .cat-tab.active {
    color: var(--text); background: var(--accent-light);
    border-color: var(--accent);
  }
  .cat-count {
    font-size: 11px; color: var(--muted);
    background: var(--border); border-radius: 4px;
    padding: 0 5px; min-width: 18px; text-align: center;
  }

  /* ===== Category Groups ===== */
  .category-group { margin-bottom: 32px; }
  .category-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .category-icon { font-size: 24px; }
  .category-title {
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text);
  }
  .category-desc {
    font-size: 12px; color: var(--muted); margin-top: 1px;
  }
  .category-docs {
    display: flex; flex-direction: column; gap: 10px;
  }

  @media (max-width: 640px) {
    .container { padding: 24px 16px 60px; }
    .doc-card { padding: 16px; gap: 12px; }
    .doc-icon { width: 40px; height: 40px; font-size: 22px; }
    .modal { width: 90%; padding: 24px; }
  }
</style>
</head>
<body>

<!-- Site Gate -->
<div id="site-gate">
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
    <div style="width:380px;">
      <h1 style="font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;">🐾 PawPrint</h1>
      <p style="font-size:14px;color:var(--muted);margin-bottom:24px;">Enter the site password to browse docs.</p>
      <form id="site-gate-form">
        <input type="password" id="site-gate-pwd" placeholder="Site password" autocomplete="off" autofocus
          style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;">
        <button type="submit" id="site-gate-btn"
          style="width:100%;padding:10px;margin-top:10px;background:var(--text);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">
          Unlock
        </button>
        <div class="error" id="site-gate-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none;">Wrong password</div>
        <a href="/" style="display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);text-decoration:none;">← Back to Home</a>
      </form>
    </div>
  </div>
</div>

<!-- List View -->
<div id="list-view" style="display:none;">
  <div class="container">
    <div class="site-header">
      <h1 id="site-title">📚 Docs</h1>
      <p id="site-desc"></p>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Search docs..." autocomplete="off">
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<!-- Auth Modal (per-doc) -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <h2>🔒 Document Locked</h2>
    <p class="subtitle" id="auth-doc-title"></p>
    <form id="auth-form">
      <input type="password" id="auth-pwd" placeholder="Enter document password" autocomplete="off" autofocus>
      <button type="submit" id="auth-btn">Unlock</button>
      <button type="button" class="cancel" onclick="closeAuth()">Cancel</button>
      <div class="error" id="auth-error">Wrong password, try again</div>
    </form>
  </div>
</div>

<!-- Doc View -->
<div id="doc-view">
  <div class="container">
    <div class="doc-header">
      <a class="back" onclick="showList()">← Back to docs</a>
      <h1 id="doc-title"></h1>
      <div class="meta">
        <span id="doc-author"></span>
        <span id="doc-date"></span>
      </div>
    </div>
    <div class="md-body" id="doc-content"></div>
    <div class="doc-footer">PawPrint 🐾 — <a href="/" style="color:var(--accent);text-decoration:none;">Home</a></div>
  </div>
</div>

<!-- Markdown parser (marked.js CDN) -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
let currentSlug = null;
let docsData = [];
let sitePassword = '';

// ===== Password Memory (localStorage) =====
const SITE_TTL = 3 * 24 * 60 * 60 * 1000;  // 3 days
const DOC_TTL  = 1 * 24 * 60 * 60 * 1000;  // 1 day

function savePassword(key, pwd, ttl) {
  localStorage.setItem('pp_' + key, JSON.stringify({ pwd, exp: Date.now() + ttl }));
}
function loadPassword(key) {
  try {
    const raw = localStorage.getItem('pp_' + key);
    if (!raw) return null;
    const { pwd, exp } = JSON.parse(raw);
    if (Date.now() > exp) { localStorage.removeItem('pp_' + key); return null; }
    return pwd;
  } catch { return null; }
}

// ===== Site Gate =====
document.getElementById('site-gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('site-gate-pwd').value;
  await trySiteUnlock(pwd, true);
});

async function trySiteUnlock(pwd, isManual) {
  const btn = document.getElementById('site-gate-btn');
  if (isManual) { btn.disabled = true; btn.textContent = 'Verifying...'; }

  try {
    const res = await fetch('/api/docs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (!res.ok) throw new Error('Auth failed');
    const data = await res.json();
    sitePassword = pwd;
    docsData = data.docs;
    categoriesData = data.categories || [];

    // Remember site password for 3 days
    savePassword('site', pwd, SITE_TTL);

    document.getElementById('site-title').textContent = '🐾 ' + (data.site?.title || 'Docs');
    document.getElementById('site-desc').textContent = data.site?.description || '';
    document.title = data.site?.title || 'Docs';

    renderGrid();

    document.getElementById('site-gate').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';

    const hash = location.hash.slice(1);
    if (hash) {
      const doc = docsData.find(d => d.slug === hash);
      if (doc) openDoc(doc.slug);
    }
    return true;
  } catch {
    if (isManual) {
      document.getElementById('site-gate-error').style.display = 'block';
      document.getElementById('site-gate-pwd').value = '';
      document.getElementById('site-gate-pwd').focus();
    }
    return false;
  } finally {
    if (isManual) { btn.disabled = false; btn.textContent = 'Unlock'; }
  }
}

// ===== URL Routing =====
function getRouteInfo() {
  const path = window.location.pathname;
  const match = path.match(/^\/docs(?:\/([a-z]+))?(?:\/([a-z0-9-]+))?$/);
  return {
    category: match ? match[1] || null : null,
    slug: match ? match[2] || null : null,
  };
}

let activeCategory = null;
let searchQuery = '';

// ===== Search =====
document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderGrid();
});

// ===== Init: try remembered password first =====
async function init() {
  const route = getRouteInfo();
  activeCategory = route.category;

  const remembered = loadPassword('site');
  if (remembered) {
    const ok = await trySiteUnlock(remembered, false);
    if (ok) {
      if (route.slug) {
        const doc = docsData.find(d => d.slug === route.slug);
        if (doc) openDoc(doc.slug);
      }
      return;
    }
  }
  document.getElementById('site-gate-pwd').focus();
}

let categoriesData = [];

function renderGrid() {
  const grid = document.getElementById('doc-grid');
  if (!docsData.length) {
    grid.innerHTML = '<div class="loading">No documents yet</div>';
    return;
  }

  // Filter by category + search
  let filteredDocs = activeCategory
    ? docsData.filter(d => (d.category || 'resources') === activeCategory)
    : docsData;

  if (searchQuery) {
    filteredDocs = filteredDocs.filter(d =>
      (d.title || '').toLowerCase().includes(searchQuery) ||
      (d.description || '').toLowerCase().includes(searchQuery) ||
      (d.author || '').toLowerCase().includes(searchQuery) ||
      (d.slug || '').toLowerCase().includes(searchQuery)
    );
  }

  // Render category tabs (counts based on search-filtered data)
  const searchFiltered = searchQuery
    ? docsData.filter(d => (d.title||'').toLowerCase().includes(searchQuery) || (d.description||'').toLowerCase().includes(searchQuery) || (d.author||'').toLowerCase().includes(searchQuery) || (d.slug||'').toLowerCase().includes(searchQuery))
    : docsData;

  let tabsHtml = '<div class="category-tabs"><a href="/docs" class="cat-tab' + (!activeCategory ? ' active' : '') + '">All <span class="cat-count">' + searchFiltered.length + '</span></a>';
  categoriesData.forEach(c => {
    const count = searchFiltered.filter(d => (d.category || 'resources') === c.id).length;
    if (count > 0) {
      tabsHtml += '<a href="/docs/' + c.id + '" class="cat-tab' + (activeCategory === c.id ? ' active' : '') + '">' + c.icon + ' ' + c.label + ' <span class="cat-count">' + count + '</span></a>';
    }
  });
  tabsHtml += '</div>';

  if (!filteredDocs.length) {
    grid.innerHTML = tabsHtml + '<div class="loading">No documents in this category</div>';
    return;
  }

  // Group docs by category
  const grouped = {};
  filteredDocs.forEach(d => {
    const cat = d.category || 'resources';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(d);
  });

  // Render by category order
  const catOrder = categoriesData.length
    ? categoriesData.map(c => c.id)
    : Object.keys(grouped);

  let html = '';
  catOrder.forEach(catId => {
    const docs = grouped[catId];
    if (!docs || !docs.length) return;
    const catMeta = categoriesData.find(c => c.id === catId) || { label: catId, icon: '📁', description: '' };

    html += `
      <div class="category-group">
        <div class="category-header">
          <span class="category-icon">${catMeta.icon}</span>
          <div>
            <h2 class="category-title">${catMeta.label}</h2>
            ${catMeta.description ? '<p class="category-desc">' + catMeta.description + '</p>' : ''}
          </div>
        </div>
        <div class="category-docs">
          ${docs.map(d => `
            <div class="doc-card" onclick="openDoc('${d.slug}')">
              <div class="doc-icon">${d.icon}</div>
              <div class="doc-info">
                <h3>
                  ${d.title}
                  ${d.locked ? '<span class="badge badge-lock">🔒</span>' : ''}
                </h3>
                <p>${d.description || ''}</p>
                <div class="doc-meta-row">
                  ${d.author ? '<span>👤 ' + d.author + '</span>' : ''}
                  ${d.date ? '<span>📅 ' + d.date + '</span>' : ''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  grid.innerHTML = tabsHtml + html;

  // Handle tab clicks with SPA navigation
  grid.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      e.preventDefault();
      const href = tab.getAttribute('href');
      const match = href.match(/^\/docs(?:\/([a-z]+))?$/);
      activeCategory = match && match[1] ? match[1] : null;
      window.history.pushState({}, '', href);
      renderGrid();
    });
  });
}

async function openDoc(slug) {
  const doc = docsData.find(d => d.slug === slug);
  if (!doc) return;

  currentSlug = slug;

  if (doc.locked) {
    // Try remembered doc password first
    const remembered = loadPassword('doc_' + slug);
    if (remembered) {
      try {
        await fetchDoc(slug, remembered);
        return;
      } catch {
        // Remembered password expired/wrong, show auth modal
        localStorage.removeItem('pp_doc_' + slug);
      }
    }
    showAuth(doc);
  } else {
    // No password needed — open directly
    await fetchDoc(slug, null);
  }
}

function showAuth(doc) {
  document.getElementById('auth-doc-title').textContent = doc.title;
  document.getElementById('auth-pwd').value = '';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-modal').classList.add('active');
  setTimeout(() => document.getElementById('auth-pwd').focus(), 100);
}

function closeAuth() {
  document.getElementById('auth-modal').classList.remove('active');
  currentSlug = null;
}

document.getElementById('auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('auth-pwd').value;
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = '验证中...';

  try {
    await fetchDoc(currentSlug, pwd);
    savePassword('doc_' + currentSlug, pwd, DOC_TTL);
    closeAuth();
  } catch (err) {
    const errEl = document.getElementById('auth-error');
    errEl.textContent = err.status === 500 ? 'Server error — file may be missing' : 'Wrong password, try again';
    errEl.style.display = 'block';
    document.getElementById('auth-pwd').value = '';
    document.getElementById('auth-pwd').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = '解锁';
  }
});

async function fetchDoc(slug, password) {
  const body = { slug };
  if (password) body.password = password;
  const res = await fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const e = new Error(err.error || 'Auth failed');
    e.status = res.status;
    throw e;
  }

  const data = await res.json();
  renderDoc(data);
}

function renderDoc(data) {
  document.getElementById('doc-title').textContent = data.title;
  document.getElementById('doc-author').textContent = data.author ? '👤 ' + data.author : '';
  document.getElementById('doc-date').textContent = data.date ? '📅 ' + data.date : '';

  // Parse markdown
  const html = marked.parse(data.content);
  document.getElementById('doc-content').innerHTML = html;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('doc-view').style.display = 'block';
  location.hash = currentSlug;
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('doc-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  const backPath = activeCategory ? '/docs/' + activeCategory : '/docs';
  window.history.pushState({}, '', backPath);
  currentSlug = null;
  renderGrid();
}

// Handle back/forward navigation
window.addEventListener('popstate', () => {
  const route = getRouteInfo();
  activeCategory = route.category;
  if (route.slug) {
    const doc = docsData.find(d => d.slug === route.slug);
    if (doc) openDoc(doc.slug);
  } else if (docsData.length) {
    document.getElementById('doc-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    renderGrid();
  }
});

init();
</script>
</body>
</html>
