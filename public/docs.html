<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPrint — Docs</title>
<style>
  :root {
    --bg: #fafafa; --card: #fff; --text: #1a1a1a; --muted: #666;
    --border: #e5e5e5; --accent: #2563eb; --accent-light: #eff6ff;
    --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
    --code-bg: #f5f5f5; --hover: #f8f8f8;
  }
  [data-theme="dark"] {
    --bg: #0a0a0a; --card: #141414; --text: #e5e5e5; --muted: #888;
    --border: #2a2a2a; --accent: #5b9cf6; --accent-light: #1a2332;
    --code-bg: #1a1a1a; --hover: #1c1c1c;
    --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ===== List View ===== */
  #list-view .site-header {
    margin-bottom: 40px;
    text-align: center;
  }
  #list-view .site-header h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
  }
  #list-view .site-header p {
    font-size: 14px; color: var(--muted); margin-top: 6px;
  }
  .doc-grid { display: flex; flex-direction: column; gap: 12px; }
  .doc-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    cursor: pointer;
    transition: all .15s ease;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .doc-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(37,99,235,0.06);
    transform: translateY(-1px);
  }
  .doc-icon {
    font-size: 28px; flex-shrink: 0;
    width: 48px; height: 48px;
    background: var(--accent-light);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .doc-info { flex: 1; min-width: 0; }
  .doc-info h3 {
    font-size: 16px; font-weight: 600; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .doc-info p { font-size: 13px; color: var(--muted); }
  .doc-meta-row {
    display: flex; gap: 12px; margin-top: 8px;
    font-size: 12px; color: var(--muted);
  }
  .lock-icon { font-size: 14px; color: var(--yellow); }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .badge-lock { background: #fefce8; color: var(--yellow); }
  .badge-burn { background: #fef2f2; color: var(--red); }
  .badge-e2e { background: #f0fdf4; color: var(--green); display: inline-flex; align-items: center; gap: 2px; }

  /* ===== Auth Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--card); border-radius: 14px;
    padding: 32px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    transform: scale(0.95); transition: transform .2s;
  }
  .modal-overlay.active .modal { transform: scale(1); }
  .modal h2 { font-size: 17px; margin-bottom: 4px; }
  .modal .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal button {
    width: 100%; padding: 10px; margin-top: 10px;
    background: var(--text); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; cursor: pointer;
    transition: opacity .2s;
  }
  .modal button:hover { opacity: .85; }
  .modal button:disabled { opacity: .5; cursor: not-allowed; }
  .modal .error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
  .modal .cancel {
    background: none; color: var(--muted);
    border: 1px solid var(--border); margin-top: 8px;
  }
  .modal .cancel:hover { background: var(--hover); }

  /* ===== Doc View ===== */
  #doc-view { display: none; }
  .doc-header {
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .doc-header .back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted); text-decoration: none;
    margin-bottom: 16px; cursor: pointer;
    transition: color .15s;
  }
  .doc-header .back:hover { color: var(--accent); }
  .doc-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .export-btns {
    display: inline-flex; gap: 6px; margin-left: auto;
  }
  .pdf-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    color: var(--muted); background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer; transition: all .15s;
  }
  .pdf-btn:hover { color: var(--text); border-color: var(--accent); }
  @media print {
    .doc-header .back, .pdf-btn, .toc-sidebar, .doc-footer { display: none !important; }
    .doc-layout { display: block; }
    .md-body { max-width: 100%; }
  }
  .doc-header .meta {
    display: flex; gap: 16px; margin-top: 8px;
    font-size: 13px; color: var(--muted);
  }

  /* Markdown render */
  .md-body h1 { font-size: 24px; font-weight: 700; margin: 36px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .md-body h2 { font-size: 20px; font-weight: 700; margin: 36px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .md-body h3 { font-size: 16px; font-weight: 600; margin: 24px 0 10px; }
  .md-body p { margin-bottom: 12px; font-size: 15px; }
  .md-body ul, .md-body ol { padding-left: 24px; margin-bottom: 12px; }
  .md-body li { margin-bottom: 4px; font-size: 14px; }
  .md-body blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    padding: 12px 16px; margin: 16px 0;
    border-radius: 0 8px 8px 0; font-size: 14px;
  }
  .md-body pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; overflow-x: auto;
    font-size: 13px; line-height: 1.5; margin: 16px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .md-body code {
    background: var(--code-bg); padding: 2px 5px;
    border-radius: 4px; font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .md-body pre code { background: none; padding: 0; }
  .md-body table {
    width: 100%; border-collapse: collapse;
    font-size: 14px; margin: 16px 0;
  }
  .md-body th {
    background: var(--code-bg); font-weight: 600;
    text-align: left; padding: 10px 14px;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  .md-body td {
    padding: 9px 14px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .md-body tr:last-child td { border-bottom: none; }
  .md-body strong { font-weight: 600; }
  .md-body a { color: var(--accent); text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .md-body img { max-width: 100%; border-radius: 8px; }

  .doc-footer {
    margin-top: 48px; padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); text-align: center;
  }

  /* ===== Doc Layout with TOC ===== */
  .doc-layout {
    display: flex; max-width: 1200px; margin: 0 auto;
  }
  .doc-main { flex: 1; min-width: 0; }
  .toc-sidebar {
    width: 220px; flex-shrink: 0;
    position: sticky; top: 24px; align-self: flex-start;
    max-height: calc(100vh - 48px); overflow-y: auto;
    padding: 24px 0 24px 24px;
    border-left: 1px solid var(--border);
    margin-left: 24px;
    display: none;
  }
  @media (min-width: 1024px) { .toc-sidebar { display: block; } }
  .toc-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    margin-bottom: 12px; padding-left: 12px;
  }
  #toc-nav a {
    display: block; padding: 4px 12px;
    font-size: 13px; line-height: 1.5;
    color: var(--muted); text-decoration: none;
    border-left: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  #toc-nav a:hover { color: var(--text); }
  #toc-nav a.active {
    color: var(--accent); border-left-color: var(--accent);
    font-weight: 500;
  }
  #toc-nav a.toc-h3 { padding-left: 24px; font-size: 12px; }

  .loading {
    text-align: center; padding: 60px 0;
    color: var(--muted); font-size: 14px;
  }

  /* ===== Theme Toggle ===== */
  .theme-toggle {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 8px;
    font-size: 16px; cursor: pointer; line-height: 1;
    transition: background .2s;
  }
  .theme-toggle:hover { background: var(--hover); }

  /* ===== Search ===== */
  .search-bar { margin-bottom: 16px; position: relative; }
  .search-bar input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; outline: none;
    background: var(--card); color: var(--text);
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* ===== Category Tabs ===== */
  .category-tabs {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    color: var(--muted); text-decoration: none;
    border: 1px solid transparent;
    transition: all .15s ease;
    cursor: pointer;
  }
  .cat-tab:hover { color: var(--text); background: var(--hover); }
  .cat-tab.active {
    color: var(--text); background: var(--accent-light);
    border-color: var(--accent);
  }
  .cat-count {
    font-size: 11px; color: var(--muted);
    background: var(--border); border-radius: 4px;
    padding: 0 5px; min-width: 18px; text-align: center;
  }

  /* ===== Category Groups ===== */
  .category-group { margin-bottom: 32px; }
  .category-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .category-icon { font-size: 24px; }
  .category-title {
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text);
  }
  .category-desc {
    font-size: 12px; color: var(--muted); margin-top: 1px;
  }
  .category-docs {
    display: flex; flex-direction: column; gap: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }

  @media (max-width: 640px) {
    .container { padding: 24px 16px 60px; }
    .doc-card { padding: 16px; gap: 12px; }
    .doc-icon { width: 40px; height: 40px; font-size: 22px; }
    .modal { width: 90%; padding: 24px; }
  }
</style>
</head>
<body>

<!-- Site Gate -->
<div id="site-gate">
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
    <div style="width:380px;">
      <h1 style="font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;display:flex;align-items:center;gap:8px;"><i data-lucide="paw-print" style="width:24px;height:24px;"></i> PawPrint</h1>
      <p style="font-size:14px;color:var(--muted);margin-bottom:24px;">Enter the site password to browse docs.</p>
      <form id="site-gate-form">
        <input type="password" id="site-gate-pwd" placeholder="Site password" autocomplete="off" autofocus
          style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;">
        <button type="submit" id="site-gate-btn"
          style="width:100%;padding:10px;margin-top:10px;background:var(--text);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">
          Unlock
        </button>
        <div class="error" id="site-gate-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none;">Wrong password</div>
        <a href="/" style="display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);text-decoration:none;">← Back to Home</a>
      </form>
    </div>
  </div>
</div>

<!-- List View -->
<div id="list-view" style="display:none;">
  <div class="container">
    <div class="site-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        <h1 id="site-title" style="display:flex;align-items:center;gap:8px;"><i data-lucide="library" style="width:22px;height:22px;"></i> Docs</h1>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme"><i data-lucide="moon" id="theme-icon" style="width:16px;height:16px;"></i></button>
      </div>
      <p id="site-desc"></p>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search docs..." autocomplete="off" style="padding-left:36px;">
      <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none;"></i>
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<!-- Auth Modal (per-doc) -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <h2 style="display:flex;align-items:center;gap:8px;"><i data-lucide="lock" style="width:18px;height:18px;"></i> Document Locked</h2>
    <p class="subtitle" id="auth-doc-title"></p>
    <form id="auth-form">
      <input type="password" id="auth-pwd" placeholder="Enter document password" autocomplete="off" autofocus>
      <button type="submit" id="auth-btn">Unlock</button>
      <button type="button" class="cancel" onclick="closeAuth()">Cancel</button>
      <div class="error" id="auth-error">Wrong password, try again</div>
    </form>
  </div>
</div>

<!-- Doc View -->
<div id="doc-view">
  <div class="doc-layout">
    <div class="doc-main">
      <div class="container">
        <div class="doc-header">
          <a class="back" onclick="showList()">← Back to docs</a>
          <h1 id="doc-title"></h1>
          <div class="meta">
            <span id="doc-author"></span>
            <span id="doc-date"></span>
            <span class="export-btns">
              <button class="pdf-btn" id="md-btn" onclick="exportMD()" title="Download as Markdown">
                <i data-lucide="file-text" style="width:14px;height:14px;"></i> MD
              </button>
              <button class="pdf-btn" id="pdf-btn" onclick="exportPDF()" title="Download as PDF">
                <i data-lucide="download" style="width:14px;height:14px;"></i> PDF
              </button>
            </span>
          </div>
        </div>
        <div class="md-body" id="doc-content"></div>
        <div class="doc-footer" style="display:flex;align-items:center;justify-content:center;gap:6px;">PawPrint <i data-lucide="paw-print" style="width:14px;height:14px;"></i> — <a href="/" style="color:var(--accent);text-decoration:none;">Home</a></div>
      </div>
    </div>
    <aside class="toc-sidebar" id="toc-sidebar">
      <div class="toc-title">On this page</div>
      <nav id="toc-nav"></nav>
    </aside>
  </div>
</div>

<!-- Markdown parser (marked.js CDN) -->
<!-- Syntax Highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- html2pdf.js for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<!-- Vercel Web Analytics -->
<script defer src="/_vercel/insights/script.js"></script>
<!-- Vercel Speed Insights -->
<script defer src="/_vercel/speed-insights/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
let currentSlug = null;
let docsData = [];
let sitePassword = '';

// ===== Password Memory (localStorage) =====
const SITE_TTL = 3 * 24 * 60 * 60 * 1000;  // 3 days
const DOC_TTL  = 1 * 24 * 60 * 60 * 1000;  // 1 day

function savePassword(key, pwd, ttl) {
  localStorage.setItem('pp_' + key, JSON.stringify({ pwd, exp: Date.now() + ttl }));
}
function loadPassword(key) {
  try {
    const raw = localStorage.getItem('pp_' + key);
    if (!raw) return null;
    const { pwd, exp } = JSON.parse(raw);
    if (Date.now() > exp) { localStorage.removeItem('pp_' + key); return null; }
    return pwd;
  } catch { return null; }
}

// ===== Site Gate =====
document.getElementById('site-gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('site-gate-pwd').value;
  await trySiteUnlock(pwd, true);
});

async function trySiteUnlock(pwd, isManual) {
  const btn = document.getElementById('site-gate-btn');
  if (isManual) { btn.disabled = true; btn.textContent = 'Verifying...'; }

  try {
    const res = await fetch('/api/docs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (!res.ok) throw new Error('Auth failed');
    const data = await res.json();
    sitePassword = pwd;
    docsData = data.docs;
    categoriesData = data.categories || [];

    // Remember site password for 3 days
    savePassword('site', pwd, SITE_TTL);

    document.getElementById('site-title').innerHTML = '<i data-lucide="library" style="width:22px;height:22px;"></i> ' + (data.site?.title || 'Docs');
    document.getElementById('site-desc').textContent = data.site?.description || '';
    document.title = data.site?.title || 'Docs';

    renderGrid();

    // Fetch view counts
    try {
      const vRes = await fetch('/api/views');
      const vData = await vRes.json();
      viewCounts = vData.views || {};
    } catch {}

    document.getElementById('site-gate').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';

    const hash = location.hash.slice(1);
    if (hash) {
      const doc = docsData.find(d => d.slug === hash);
      if (doc) openDoc(doc.slug);
    }
    return true;
  } catch {
    if (isManual) {
      document.getElementById('site-gate-error').style.display = 'block';
      document.getElementById('site-gate-pwd').value = '';
      document.getElementById('site-gate-pwd').focus();
    }
    return false;
  } finally {
    if (isManual) { btn.disabled = false; btn.textContent = 'Unlock'; }
  }
}

// ===== Theme Toggle =====
(function() {
  const saved = localStorage.getItem('pp_theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('theme-toggle');
  function updateIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    btn.innerHTML = '<i data-lucide="' + (isDark ? 'sun' : 'moon') + '" style="width:16px;height:16px;"></i>';
    // Switch hljs theme
    document.getElementById('hljs-light').disabled = isDark;
    document.getElementById('hljs-dark').disabled = !isDark;
    if (window.lucide) lucide.createIcons();
  }
  updateIcon();
  btn.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pp_theme', next);
    updateIcon();
  });
})();

// ===== URL Routing =====
function getRouteInfo() {
  const path = window.location.pathname;
  const match = path.match(/^\/docs(?:\/([a-z]+))?(?:\/([a-z0-9-]+))?$/);
  return {
    category: match ? match[1] || null : null,
    slug: match ? match[2] || null : null,
  };
}

let activeCategory = null;
let searchQuery = '';
let viewCounts = {};

// ===== Search =====
document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderGrid();
});

// ===== Direct doc access (bypass site gate for non-password docs) =====
async function tryDirectAccess(slug) {
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug })
    });
    if (res.ok) {
      const data = await res.json();
      lastDocRaw = data;
      currentSlug = slug;
      document.getElementById('site-gate').style.display = 'none';
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('doc-view').style.display = 'block';
      renderDoc(data);
      return true;
    }
    // 401 = needs password, fall through to gate
    return false;
  } catch { return false; }
}

// ===== Init: try direct access first, then site gate =====
async function init() {
  const route = getRouteInfo();
  activeCategory = route.category;

  // Check for direct doc link (hash or path slug)
  const directSlug = route.slug || location.hash.slice(1);
  if (directSlug) {
    const ok = await tryDirectAccess(directSlug);
    if (ok) return;
    // Doc needs password — need site unlock first to know if it's doc-locked or site-locked
  }

  // Try remembered site password
  const remembered = loadPassword('site');
  if (remembered) {
    const ok = await trySiteUnlock(remembered, false);
    if (ok) {
      if (directSlug) {
        const doc = docsData.find(d => d.slug === directSlug);
        if (doc) openDoc(doc.slug);
      }
      return;
    }
  }
  document.getElementById('site-gate-pwd').focus();
}

let categoriesData = [];

function renderGrid() {
  const grid = document.getElementById('doc-grid');
  if (!docsData.length) {
    grid.innerHTML = '<div class="loading">No documents yet</div>';
    return;
  }

  // Filter by category + search
  let filteredDocs = activeCategory
    ? docsData.filter(d => (d.category || 'resources') === activeCategory)
    : docsData;

  if (searchQuery) {
    filteredDocs = filteredDocs.filter(d =>
      (d.title || '').toLowerCase().includes(searchQuery) ||
      (d.description || '').toLowerCase().includes(searchQuery) ||
      (d.author || '').toLowerCase().includes(searchQuery) ||
      (d.slug || '').toLowerCase().includes(searchQuery)
    );
  }

  // Render category tabs (counts based on search-filtered data)
  const searchFiltered = searchQuery
    ? docsData.filter(d => (d.title||'').toLowerCase().includes(searchQuery) || (d.description||'').toLowerCase().includes(searchQuery) || (d.author||'').toLowerCase().includes(searchQuery) || (d.slug||'').toLowerCase().includes(searchQuery))
    : docsData;

  let tabsHtml = '<div class="category-tabs"><a href="/docs" class="cat-tab' + (!activeCategory ? ' active' : '') + '">All <span class="cat-count">' + searchFiltered.length + '</span></a>';
  categoriesData.forEach(c => {
    const count = searchFiltered.filter(d => (d.category || 'resources') === c.id).length;
    if (count > 0) {
      tabsHtml += '<a href="/docs/' + c.id + '" class="cat-tab' + (activeCategory === c.id ? ' active' : '') + '">' + c.icon + ' ' + c.label + ' <span class="cat-count">' + count + '</span></a>';
    }
  });
  tabsHtml += '</div>';

  if (!filteredDocs.length) {
    grid.innerHTML = tabsHtml + '<div class="loading">No documents in this category</div>';
    return;
  }

  // Group docs by category
  const grouped = {};
  filteredDocs.forEach(d => {
    const cat = d.category || 'resources';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(d);
  });

  // Render by category order
  const catOrder = categoriesData.length
    ? categoriesData.map(c => c.id)
    : Object.keys(grouped);

  let html = '';
  catOrder.forEach(catId => {
    const docs = grouped[catId];
    if (!docs || !docs.length) return;
    const catMeta = categoriesData.find(c => c.id === catId) || { label: catId, icon: '📁', description: '' };

    html += `
      <div class="category-group">
        <div class="category-header">
          <span class="category-icon">${catMeta.icon}</span>
          <div>
            <h2 class="category-title">${catMeta.label}</h2>
            ${catMeta.description ? '<p class="category-desc">' + catMeta.description + '</p>' : ''}
          </div>
        </div>
        <div class="category-docs">
          ${docs.map(d => `
            <div class="doc-card" onclick="openDoc('${d.slug}')">
              <div class="doc-icon">${d.icon}</div>
              <div class="doc-info">
                <h3>
                  ${d.title}
                  ${d.locked ? '<span class="badge badge-lock"><i data-lucide="lock" style="width:12px;height:12px;"></i></span>' : ''}
                  ${d.burn ? '<span class="badge badge-burn"><i data-lucide="flame" style="width:12px;height:12px;"></i></span>' : ''}
                  ${d.encrypted ? '<span class="badge badge-e2e"><i data-lucide="shield-check" style="width:12px;height:12px;"></i> E2E</span>' : ''}
                </h3>
                <p>${d.description || ''}</p>
                <div class="doc-meta-row">
                  ${d.author ? '<span style="display:inline-flex;align-items:center;gap:3px;"><i data-lucide="user" style="width:12px;height:12px;"></i> ' + d.author + '</span>' : ''}
                  ${d.date ? '<span style="display:inline-flex;align-items:center;gap:3px;"><i data-lucide="calendar" style="width:12px;height:12px;"></i> ' + d.date + '</span>' : ''}
                  ${viewCounts[d.slug] ? '<span style="display:inline-flex;align-items:center;gap:3px;"><i data-lucide="eye" style="width:12px;height:12px;"></i> ' + viewCounts[d.slug] + '</span>' : ''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  grid.innerHTML = tabsHtml + html;

  // Render Lucide icons
  if (window.lucide) lucide.createIcons();

  // Handle tab clicks with SPA navigation
  grid.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      e.preventDefault();
      const href = tab.getAttribute('href');
      const match = href.match(/^\/docs(?:\/([a-z]+))?$/);
      activeCategory = match && match[1] ? match[1] : null;
      window.history.pushState({}, '', href);
      renderGrid();
    });
  });
}

async function openDoc(slug) {
  const doc = docsData.find(d => d.slug === slug);
  if (!doc) return;

  currentSlug = slug;

  if (doc.locked) {
    // Try remembered doc password first
    const remembered = loadPassword('doc_' + slug);
    if (remembered) {
      try {
        await fetchDoc(slug, remembered);
        return;
      } catch {
        // Remembered password expired/wrong, show auth modal
        localStorage.removeItem('pp_doc_' + slug);
      }
    }
    showAuth(doc);
  } else {
    // No password needed — open directly
    await fetchDoc(slug, null);
  }
}

function showAuth(doc) {
  document.getElementById('auth-doc-title').textContent = doc.title;
  document.getElementById('auth-pwd').value = '';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-modal').classList.add('active');
  setTimeout(() => document.getElementById('auth-pwd').focus(), 100);
}

function closeAuth() {
  document.getElementById('auth-modal').classList.remove('active');
  currentSlug = null;
}

document.getElementById('auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('auth-pwd').value;
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = '验证中...';

  try {
    await fetchDoc(currentSlug, pwd);
    savePassword('doc_' + currentSlug, pwd, DOC_TTL);
    closeAuth();
  } catch (err) {
    const errEl = document.getElementById('auth-error');
    errEl.textContent = err.status === 410 ? 'This document has expired'
      : err.status === 500 ? 'Server error — file may be missing'
      : 'Wrong password, try again';
    errEl.style.display = 'block';
    document.getElementById('auth-pwd').value = '';
    document.getElementById('auth-pwd').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = '解锁';
  }
});

async function fetchDoc(slug, password) {
  const body = { slug };
  if (password) body.password = password;
  const res = await fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const e = new Error(err.error || 'Auth failed');
    e.status = res.status;
    throw e;
  }

  const data = await res.json();
  lastDocRaw = data;
  renderDoc(data);
}

async function renderDoc(data) {
  // If encrypted, decrypt content client-side
  if (data.encrypted && data.content) {
    // Get decryption key from URL fragment: #key=xxx or from prompt
    let e2eKey = null;
    const hashParams = new URLSearchParams(location.hash.slice(1));
    e2eKey = hashParams.get('key');
    if (!e2eKey) {
      e2eKey = prompt('This document is end-to-end encrypted.\nEnter the decryption key:');
    }
    if (!e2eKey) {
      document.getElementById('doc-content').innerHTML = '<p style="color:var(--red);">Decryption key required to view this document.</p>';
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('doc-view').style.display = 'block';
      return;
    }
    try {
      data.content = await E2E.decrypt(data.content, e2eKey);
    } catch {
      document.getElementById('doc-content').innerHTML = '<p style="color:var(--red);">Failed to decrypt. Wrong key?</p>';
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('doc-view').style.display = 'block';
      return;
    }
  }

  document.getElementById('doc-title').textContent = data.title;
  document.getElementById('doc-author').innerHTML = data.author ? '<i data-lucide="user" style="width:14px;height:14px;vertical-align:-2px;"></i> ' + data.author : '';
  document.getElementById('doc-date').innerHTML = data.date ? '<i data-lucide="calendar" style="width:14px;height:14px;vertical-align:-2px;"></i> ' + data.date : '';

  // Parse markdown
  const html = marked.parse(data.content);
  document.getElementById('doc-content').innerHTML = html;

  // Fix anchor links — scroll within doc instead of changing URL
  const docBody = document.getElementById('doc-content');
  docBody.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const rawHref = a.getAttribute('href').slice(1);
      const decoded = decodeURIComponent(rawHref);
      // Try multiple ways to find the target
      let target = document.getElementById(decoded)
        || document.getElementById(rawHref)
        || docBody.querySelector('[id="' + CSS.escape(decoded) + '"]')
        || docBody.querySelector('[id="' + CSS.escape(rawHref) + '"]');
      // Fallback: find heading whose id contains the text
      if (!target) {
        const headings = docBody.querySelectorAll('h1,h2,h3,h4,h5,h6');
        const search = decoded.replace(/^\d+[-.]?\s*/, '').toLowerCase();
        for (const h of headings) {
          if (h.id && h.id.toLowerCase().includes(search)) { target = h; break; }
          if (h.textContent.toLowerCase().includes(search)) { target = h; break; }
        }
      }
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('doc-view').style.display = 'block';

  // Track doc view (Vercel Analytics + KV counter)
  if (window.va) window.va('event', { name: 'doc_view', data: { slug: currentSlug, title: data.title } });
  fetch('/api/views', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slug: currentSlug })
  }).then(r => r.json()).then(d => {
    if (d.views) viewCounts[currentSlug] = d.views;
  }).catch(() => {});

  // Syntax highlighting
  docBody.querySelectorAll('pre code').forEach(block => {
    // Check if it's a mermaid block
    if (block.className.includes('mermaid') || block.className.includes('language-mermaid')) {
      const pre = block.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = block.textContent;
      pre.replaceWith(div);
    } else {
      hljs.highlightElement(block);
    }
  });

  // Render mermaid diagrams
  if (window.mermaid && docBody.querySelector('.mermaid')) {
    mermaid.initialize({
      startOnLoad: false,
      theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default'
    });
    mermaid.run({ nodes: docBody.querySelectorAll('.mermaid') });
  }

  // Render Lucide icons in doc view
  if (window.lucide) lucide.createIcons();

  // Build TOC from headings
  buildTOC();

  // Use pushState instead of location.hash to avoid triggering popstate
  const docPath = activeCategory
    ? '/docs/' + activeCategory + '/' + currentSlug
    : '/docs#' + currentSlug;
  window.history.pushState({ viewing: currentSlug }, '', docPath);
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('doc-view').style.display = 'none';
  // If we have doc list loaded, show it; otherwise show site gate
  if (docsData.length) {
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('site-gate').style.display = 'none';
  } else {
    document.getElementById('site-gate').style.display = 'block';
    document.getElementById('list-view').style.display = 'none';
  }
  const backPath = activeCategory ? '/docs/' + activeCategory : '/docs';
  window.history.pushState({}, '', backPath);
  currentSlug = null;
  if (docsData.length) renderGrid();
}

// Handle back/forward navigation
window.addEventListener('popstate', (e) => {
  // If state says we're viewing a doc, stay on doc view
  if (e.state && e.state.viewing) return;

  const route = getRouteInfo();
  activeCategory = route.category;

  // Check hash for legacy direct links
  const hash = location.hash.slice(1);
  if (hash && docsData.length) {
    const doc = docsData.find(d => d.slug === hash);
    if (doc) { openDoc(doc.slug); return; }
  }

  if (route.slug && docsData.length) {
    const doc = docsData.find(d => d.slug === route.slug);
    if (doc) { openDoc(doc.slug); return; }
  }

  // Back to list
  if (docsData.length) {
    document.getElementById('doc-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    currentSlug = null;
    renderGrid();
  }
});

// ===== TOC Builder + Scroll Spy =====
function buildTOC() {
  const tocNav = document.getElementById('toc-nav');
  const docBody = document.getElementById('doc-content');
  const headings = docBody.querySelectorAll('h1, h2, h3');

  if (headings.length < 2) {
    document.getElementById('toc-sidebar').style.display = 'none';
    return;
  }

  let html = '';
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'heading-' + i;
    const level = h.tagName.toLowerCase();
    const cls = level === 'h3' ? ' toc-h3' : '';
    const text = h.textContent.replace(/^[\d.]+\s*/, '').trim();
    if (text) {
      html += '<a href="#' + h.id + '" class="toc-link' + cls + '" data-target="' + h.id + '">' + text + '</a>';
    }
  });
  tocNav.innerHTML = html;

  // Click handler — smooth scroll
  tocNav.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(a.dataset.target);
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });

  // Scroll spy
  let ticking = false;
  function updateActiveTOC() {
    const links = tocNav.querySelectorAll('.toc-link');
    const scrollY = window.scrollY + 80;
    let current = null;
    headings.forEach((h) => {
      if (h.offsetTop <= scrollY) current = h.id;
    });
    links.forEach(l => {
      l.classList.toggle('active', l.dataset.target === current);
    });
    ticking = false;
  }
  window.addEventListener('scroll', () => {
    if (!ticking) { ticking = true; requestAnimationFrame(updateActiveTOC); }
  }, { passive: true });
  updateActiveTOC();
}

let lastDocRaw = null;

// ===== E2E Encryption Utilities =====
const E2E = {
  async deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
    );
  },
  async encrypt(plaintext, password) {
    const enc = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await this.deriveKey(password, salt);
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
    // Pack: salt(16) + iv(12) + ciphertext
    const packed = new Uint8Array(salt.length + iv.length + new Uint8Array(ciphertext).length);
    packed.set(salt, 0);
    packed.set(iv, 16);
    packed.set(new Uint8Array(ciphertext), 28);
    return btoa(String.fromCharCode(...packed));
  },
  async decrypt(base64Data, password) {
    const packed = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
    const salt = packed.slice(0, 16);
    const iv = packed.slice(16, 28);
    // ciphertext + authTag (Web Crypto expects them concatenated)
    const ciphertextWithTag = packed.slice(28);
    const key = await this.deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertextWithTag);
    return new TextDecoder().decode(decrypted);
  }
};

// ===== Markdown Export =====
function exportMD() {
  if (!lastDocRaw || !lastDocRaw.content) return;
  const title = (lastDocRaw.title || 'document').replace(/[^a-zA-Z0-9\u4e00-\u9fff-_ ]/g, '').trim();
  const blob = new Blob([lastDocRaw.content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = title + '.md';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== PDF Export =====
function exportPDF() {
  const title = document.getElementById('doc-title').textContent || 'document';
  const content = document.getElementById('doc-content');
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader" style="width:14px;height:14px;" class="spin"></i> Exporting...';
  if (window.lucide) lucide.createIcons();

  const opt = {
    margin: [12, 16, 12, 16],
    filename: title.replace(/[^a-zA-Z0-9\u4e00-\u9fff-_ ]/g, '').trim() + '.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(content).save().then(() => {
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="download" style="width:14px;height:14px;"></i> PDF';
    if (window.lucide) lucide.createIcons();
  });
}

init().then(() => { if (window.lucide) lucide.createIcons(); });
document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
